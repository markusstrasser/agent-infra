[project]
name = "corpus-core"
version = "0.2.0"
description = "Canonical shared corpus store — PDFs, parses, citances, annotations, graph index"
readme = "../../README.md"
requires-python = ">=3.11"
# Lean base = the read/identity/annotate/outbox core (duckdb + jsonschema). PDF/HTML
# extraction, network ingest, and figure-parsing deps are extras so downstream
# read-only consumers (e.g. claimcore in the genome-toolkit cohort) install a thin tree.
# Full-CLI consumers request `corpus-core[all]`. See module→dep map: pypdf/pymupdf4llm/
# trafilatura → extract/*; httpx → ingest.py; pydantic → figure_extract.py.
dependencies = [
    "duckdb>=1.0",
    "jsonschema>=4.20",
]

[project.optional-dependencies]
extract = ["pypdf>=4.0", "pymupdf4llm>=0.0.20", "trafilatura>=2.0"]
net = ["httpx>=0.27"]
figures = ["pydantic>=2.0"]
# `all` = everything the `corpus` CLI needs to run end-to-end (NOT the heavier
# opt-in integrations below, which stay separately requestable).
all = ["corpus-core[extract,net,figures]"]
llm-fallback = ["google-genai>=1.0"]
liteparse = ["liteparse>=2.0"]
modal = [
    "modal>=1.0,<2.0",
]

[project.scripts]
corpus = "corpus_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["corpus_core"]

[tool.hatch.build.targets.wheel.force-include]
"corpus_core/graph_schema.sql" = "corpus_core/graph_schema.sql"
"../../schemas/v1/annotation.v1.json" = "corpus_core/schemas/v1/annotation.v1.json"
"../../schemas/v1/source_record.v1.json" = "corpus_core/schemas/v1/source_record.v1.json"
"../../schemas/v1/claim.v1.json" = "corpus_core/schemas/v1/claim.v1.json"
"../../schemas/v1/verdict.v1.json" = "corpus_core/schemas/v1/verdict.v1.json"

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "rfc8785>=0.1.4",
]
