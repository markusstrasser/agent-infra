[project]
name = "corpus-core"
version = "0.1.0"
description = "Canonical shared corpus store — PDFs, parses, citances, annotations, graph index"
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
    "duckdb>=1.0",
    "pypdf>=4.0",
]

[project.scripts]
corpus = "corpus_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["corpus_core"]

[tool.hatch.build.targets.wheel.force-include]
"corpus_core/graph_schema.sql" = "corpus_core/graph_schema.sql"

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
