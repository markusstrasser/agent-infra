[project]
name = "corpus-testing"
version = "0.1.0"
description = "Test fixtures for downstream MCPs and tools that consume corpus-core"
requires-python = ">=3.11"
dependencies = [
    "corpus-core",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.optional-dependencies]
mcp = ["fastmcp>=3.0,<4.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["corpus_testing"]

[tool.pytest.ini_options]
testpaths = ["tests"]
